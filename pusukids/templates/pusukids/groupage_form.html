{% extends 'base.html' %}

{% block title %}{{ action_title|default:"Formulario de Grupo de Edad" }}{% endblock %}

{% block body %}
    <h1>{{ action }} Groupo de edad</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">{{ action }}</button>
        <a href="{% url 'pusukids:coordinator_list' %}" class="btn btn-secondary">Cancelar</a>
    </form>
{% endblock %}
