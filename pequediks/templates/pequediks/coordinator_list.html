{% extends 'base.html' %}
{% load static %}

{% block title %}Lista de coordinadores{% endblock %}

{% block body %}
<div class="container mt-4"></div>
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="mb-0">Lista de coordinadores</h1>
    <a class="btn btn-primary" href="{% url 'pequediks:coordinator_create' %}">
      Crear Nuevo Coordinador
    </a>
    
  </div>

<table class="table table-striped table-hover">
<thead class="table-dark">
  <tr>
      <th>Nombre</th>
      <th>Apellido</th>
      <th>Acciones</th>
  </tr>
</thead>
<tbody>
  {% for c in coordinators %}
    <tr>
      <td>{{ c.name }}</td>
      <td>{{ c.surname }}</td>        
      <td>
        <!-- Botones para Detalle, Actualizar, Eliminar -->
        <a class="btn btn-warning btn-sm" href="{% url 'pequediks:coordinator_update' c.pk %}" title="Editar">
          <i class="fas fa-edit"></i>         
        </a>        
        <a href="{% url 'pequediks:coordinator_delete' c.pk %}" class="btn btn-danger btn-sm" title="Eliminar">
          <i class="fas fa-trash-alt"></i>
      </a>
      </td>
    </tr>
  {% endfor %}
</tbody>
</table>
<a href="{% url 'pequediks:index' %}" class="btn btn-secondary">Volver al Inicio</a>
</div>

{% endblock %}
<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
