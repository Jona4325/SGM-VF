{% extends "base.html" %}
{% load i18n %}

{% block title %}{% translate "Update Assistance Record" %}{% endblock %}

{% block body %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h2>{% translate "Update Assistance Record" %}</h2>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="{{ form.server.id_for_label }}" class="form-label">{{ form.server.label }}</label>
                            {{ form.server }}
                        </div>
                        <div class="mb-3">
                            <label for="{{ form.date.id_for_label }}" class="form-label">{{ form.date.label }}</label>
                            {{ form.date }}
                        </div>
                        <div class="mb-3 form-check">
                            {{ form.attended }}
                            <label for="{{ form.attended.id_for_label }}" class="form-check-label">{{ form.attended.label }}</label>
                        </div>
                        <div class="mt-4">
                            <button type="submit" class="btn btn-primary">{% translate "Save Changes" %}</button>
                            <a href="{% url 'alabanza:assistance_list' %}" class="btn btn-secondary">{% translate "Cancel" %}</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
