{% if page_obj and page_obj.paginator.num_pages %}
<nav aria-label="Page navigation" class="mt-3">
  <ul class="pagination justify-content-center">
    {% if page_obj.has_previous %}
      <li class="page-item"><a class="page-link" href="?page=1{{ pagination_query|default:'' }}">&laquo; Primera</a></li>
      <li class="page-item"><a class="page-link" href="?page={{ page_obj.previous_page_number }}{{ pagination_query|default:'' }}">Anterior</a></li>
    {% endif %}

    <li class="page-item disabled"><span class="page-link">Pág. {{ page_obj.number }} / {{ page_obj.paginator.num_pages }}</span></li>

    {% if page_obj.has_next %}
      <li class="page-item"><a class="page-link" href="?page={{ page_obj.next_page_number }}{{ pagination_query|default:'' }}">Siguiente</a></li>
      <li class="page-item"><a class="page-link" href="?page={{ page_obj.paginator.num_pages }}{{ pagination_query|default:'' }}">Última &raquo;</a></li>
    {% endif %}
  </ul>
</nav>
{% endif %}
