{% extends "base.html" %}

{% block title %}Iniciar Sesi&oacute;n{% endblock %}

{% block body %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-lg">
      <div class="card-header bg-primary text-white text-center">
        <h3 class="mb-0">Iniciar Sesi&oacute;n</h3>
      </div>
      <div class="card-body p-4">
        {% if form.errors %}
        <div class="alert alert-danger" role="alert">
          Revisa tus credenciales y la iglesia seleccionada.
        </div>
        {% endif %}

        <form method="post" action="{% url 'account:login' %}">
          {% csrf_token %}
          <div class="mb-3">
            <label for="{{ form.tenant.id_for_label }}" class="form-label">Iglesia</label>
            {{ form.tenant }}
          </div>
          <div class="mb-3">
            <label for="{{ form.username.id_for_label }}" class="form-label">Usuario</label>
            {{ form.username }}
          </div>
          <div class="mb-3">
            <label for="{{ form.password.id_for_label }}" class="form-label">Contrase&ntilde;a</label>
            {{ form.password }}
          </div>
          <button type="submit" class="btn btn-primary w-100">Ingresar</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
