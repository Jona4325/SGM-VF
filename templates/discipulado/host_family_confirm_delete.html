{% extends "base.html" %}

{% block title %}Eliminar Familia Anfitriona{% endblock %}

{% block body %}
<div class="card shadow-sm border-0">
  <div class="card-body p-4">
    <h3 class="mb-3">Eliminar familia anfitriona</h3>
    <p>¿Deseas eliminar a <strong>{{ object }}</strong>?</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Eliminar</button>
      <a href="{% url 'discipulado:host_family_list' %}" class="btn btn-secondary">Cancelar</a>
    </form>
  </div>
</div>
{% endblock %}
